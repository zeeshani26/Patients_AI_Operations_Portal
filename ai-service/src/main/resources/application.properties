spring.application.name=ai-service

server.port=4003

# Database Configuration (for production use PostgreSQL)
# For local development, uncomment H2 settings below
#spring.datasource.url=jdbc:h2:mem:aidb
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.jpa.hibernate.ddl-auto=update

# OpenAI Configuration (optional - set via environment variable)
openai.api.key=${OPENAI_API_KEY:}
ai.use-openai=${USE_OPENAI:false}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.tracing.sampling.probability=1.0

# Distributed Tracing
spring.zipkin.base-url=http://localhost:9411
spring.sleuth.sampler.probability=1.0

# Resilience4j Configuration
resilience4j.circuitbreaker.instances.aiService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.aiService.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.aiService.slidingWindowSize=10
resilience4j.retry.instances.aiService.maxAttempts=3
resilience4j.retry.instances.aiService.waitDuration=1000

# Caching
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=200,expireAfterWrite=30m

# API Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.root=info
logging.level.com.pm.aiservice=debug


